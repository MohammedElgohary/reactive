name: Publish to NPM

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.2) — must be higher than current published version"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Bump version (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" = "${{ github.event.inputs.version }}" ]; then
            echo "Version $CURRENT is already set — skipping bump"
          else
            npm version ${{ github.event.inputs.version }} --no-git-tag-version
          fi

      - name: Publish to NPM
        id: publish_npm
        continue-on-error: true
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: NPM publish result
        run: |
          if [ "${{ steps.publish_npm.outcome }}" = "failure" ]; then
            echo "⚠️ NPM publish failed (version may already exist) — continuing to GitHub Packages"
          else
            echo "✅ Published to NPM successfully"
          fi

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if NPM publish failed
        if: steps.publish_npm.outcome == 'failure'
        run: |
          echo "❌ NPM publish failed — check logs above"
          exit 1

      - name: Create GitHub Release (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          body: |
            Release v${{ github.event.inputs.version }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: |
            dist/
            package.json
            README.md
            LICENSE
          retention-days: 30
