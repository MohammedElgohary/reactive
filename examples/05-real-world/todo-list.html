<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List · Reactive</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .todo-item {
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        gap: 0.75rem;
        transition: background 0.15s;
      }
      .todo-item:last-child {
        border-bottom: none;
      }
      .todo-item:hover {
        background: var(--surface-2);
      }
      .todo-item.completed .todo-text {
        text-decoration: line-through;
        color: var(--muted);
      }
      .todo-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: var(--primary);
      }
      .todo-text {
        flex: 1;
        font-size: 0.95rem;
      }
      .todo-delete {
        background: none;
        border: none;
        color: var(--danger);
        cursor: pointer;
        font-size: 1.1rem;
        opacity: 0;
        padding: 0.25rem 0.5rem;
        border-radius: var(--r-sm);
        transition: opacity 0.15s;
      }
      .todo-item:hover .todo-delete {
        opacity: 1;
      }
      .filter-btn {
        padding: 0.4rem 0.9rem;
        border-radius: var(--r-sm);
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--muted);
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.15s;
      }
      .filter-btn.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .empty-state {
        text-align: center;
        padding: 2.5rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <a href="../index.html" class="topbar-brand">&#9889; Reactive</a>
      <div class="topbar-links">
        <a href="counter.html">Counter</a>
        <a href="todo-list.html" class="active">Todo List</a>
        <a href="shopping-cart.html">Shopping Cart</a>
        <a href="computed-async.html">Async Computed</a>
      </div>
    </nav>
    <main class="page" style="max-width: 640px">
      <header class="page-header">
        <h1>Todo List</h1>
        <p class="page-subtitle" id="date"></p>
      </header>

      <div class="card">
        <div class="section">
          <div class="btn-group">
            <input
              class="input"
              style="flex: 1"
              type="text"
              id="new-todo"
              placeholder="What needs to be done?"
            />
            <button class="btn btn-primary" id="add-btn">Add</button>
          </div>
        </div>

        <div class="section" style="padding-top: 0">
          <div class="btn-group">
            <button class="filter-btn active" id="filter-all">All</button>
            <button class="filter-btn" id="filter-active">Active</button>
            <button class="filter-btn" id="filter-completed">Completed</button>
          </div>
        </div>

        <div id="todo-list"></div>

        <div
          class="section"
          style="border-top: 1px solid var(--border); padding-top: 1rem"
        >
          <div
            class="btn-group"
            style="justify-content: space-between; align-items: center"
          >
            <div class="btn-group" style="gap: 1.5rem">
              <div class="stat-row" style="gap: 0.4rem">
                <span class="stat-label">Total</span>
                <span
                  id="total-count"
                  style="font-weight: 600; color: var(--primary)"
                  >0</span
                >
              </div>
              <div class="stat-row" style="gap: 0.4rem">
                <span class="stat-label">Active</span>
                <span
                  id="active-count"
                  style="font-weight: 600; color: var(--primary)"
                  >0</span
                >
              </div>
              <div class="stat-row" style="gap: 0.4rem">
                <span class="stat-label">Done</span>
                <span
                  id="completed-count"
                  style="font-weight: 600; color: var(--success)"
                  >0</span
                >
              </div>
            </div>
            <button class="btn btn-secondary" id="clear-completed">
              Clear Completed
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="../../dist/reactive.iife.min.js"></script>
    <script>
      const {
        reactive,
        computed,
        batch,
        bindText,
        bindClass,
        render,
        onClick,
        onEnter,
        escapeHtmlEntities,
      } = Reactive;

      const state = reactive({
        todos: [
          { id: 1, text: "Learn Reactive", completed: true },
          { id: 2, text: "Build awesome apps", completed: false },
          { id: 3, text: "Share with the world", completed: false },
        ],
        filter: "all",
      });
      let nextId = 4;

      const filteredTodos = computed(() => {
        if (state.filter === "active")
          return state.todos.filter((t) => !t.completed);
        if (state.filter === "completed")
          return state.todos.filter((t) => t.completed);
        return state.todos;
      });
      const totalCount = computed(() => state.todos.length);
      const activeCount = computed(
        () => state.todos.filter((t) => !t.completed).length,
      );
      const completedCount = computed(
        () => state.todos.filter((t) => t.completed).length,
      );

      render(
        "#todo-list",
        () => {
          const todos = filteredTodos.value;
          if (!todos.length) {
            const msg =
              state.filter === "all"
                ? "No todos yet. Add one above!"
                : "No " + state.filter + " todos.";
            return '<div class="empty-state">' + msg + "</div>";
          }
          return todos
            .map(
              (todo) =>
                '<div class="todo-item ' +
                (todo.completed ? "completed" : "") +
                '" data-id="' +
                todo.id +
                '">' +
                '<input type="checkbox" ' +
                (todo.completed ? "checked" : "") +
                ' onchange="toggleTodo(' +
                todo.id +
                ')" aria-label="Toggle todo" />' +
                '<span class="todo-text">' +
                escapeHtmlEntities(todo.text) +
                "</span>" +
                '<button class="todo-delete" onclick="deleteTodo(' +
                todo.id +
                ')" aria-label="Delete todo">x</button>' +
                "</div>",
            )
            .join("");
        },
        { trusted: true },
      );

      bindText("#total-count", totalCount);
      bindText("#active-count", activeCount);
      bindText("#completed-count", completedCount);
      bindClass("#filter-all", "active", () => state.filter === "all");
      bindClass("#filter-active", "active", () => state.filter === "active");
      bindClass(
        "#filter-completed",
        "active",
        () => state.filter === "completed",
      );

      document.getElementById("date").textContent =
        new Date().toLocaleDateString("en-US", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        });

      window.toggleTodo = function (id) {
        const todo = state.todos.find((t) => t.id === id);
        if (todo) todo.completed = !todo.completed;
      };
      window.deleteTodo = function (id) {
        const idx = state.todos.findIndex((t) => t.id === id);
        if (idx !== -1) state.todos.splice(idx, 1);
      };

      function addTodo() {
        const input = document.getElementById("new-todo");
        const text = input.value.trim();
        if (text) {
          state.todos.push({ id: nextId++, text, completed: false });
          input.value = "";
        }
      }

      onClick("#add-btn", addTodo);
      onEnter("#new-todo", addTodo);

      onClick("#filter-all", () => (state.filter = "all"));
      onClick("#filter-active", () => (state.filter = "active"));
      onClick("#filter-completed", () => (state.filter = "completed"));
      onClick(
        "#clear-completed",
        () => (state.todos = state.todos.filter((t) => !t.completed)),
      );
    </script>
  </body>
</html>
